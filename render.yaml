services:
  - type: web
    name: speaker-recognition-backend
    env: python
    rootDir: .
    buildCommand: python scripts/bootstrap_redimnet.py && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: singapore
    autoDeploy: true
    

