services:
  - type: web
    name: speaker-recognition-backend
    env: python
    pythonVersion: 3.11
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: singapore
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
